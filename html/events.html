<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Event Playground</title>
</head>
<body>

```
<h1>Event Playground</h1>

<hr>

<h2>1. Click Event</h2>
<button id="btnClick">Bấm vào đây</button>
<p id="clickResult"></p>

<hr>

<h2>2. Change Event</h2>
<select id="colorSelect">
    <option value="">-- Chọn màu --</option>
    <option value="red">Đỏ</option>
    <option value="blue">Xanh dương</option>
    <option value="green">Xanh lá</option>
</select>
<p id="colorResult">Văn bản sẽ đổi màu</p>

<hr>

<h2>3. Keyup Event</h2>
<input type="text" id="nameInput" placeholder="Nhập tên của bạn">
<p>Xem trước: <span id="previewName"></span></p>

<hr>

<h2>4. Submit Event</h2>
<form id="myForm">
    <input type="text" placeholder="Nhập nội dung">
    <button type="submit">Gửi</button>
</form>
<p id="submitResult"></p>

<script src="../js/events.js"></script>
```

</body>
</html>
